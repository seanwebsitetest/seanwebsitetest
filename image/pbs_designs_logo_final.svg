<?xml version="1.0" encoding="UTF-8"?>
<svg id="PBS_Designs_Logo_Vector_Final" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 500 500" preserveAspectRatio="xMidYMid meet">
  <defs>
    <clipPath id="circleClipFinal">
      <circle cx="250" cy="250" r="248"/>
    </clipPath>

    <linearGradient id="ringGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ced8e6"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  
  <g clip-path="url(#circleClipFinal)">
    
    <g id="grid_globe" opacity="0.4" stroke="#bf714d" stroke-width="1.5" fill="none">
      <ellipse cx="250" cy="250" rx="230" ry="110"/>
      <ellipse cx="250" cy="250" rx="230" ry="190"/>
      <ellipse cx="250" cy="250" rx="110" ry="230"/>
      <ellipse cx="250" cy="250" rx="190" ry="230"/>
      <path d="M70,110 Q250,250 430,110" />
      <path d="M70,390 Q250,250 430,390" />
      <line x1="20" y1="250" x2="480" y2="250" />
      <line x1="250" y1="20" x2="250" y2="480" />
    </g>
    
    <g id="text_PBS_Large" transform="translate(250, 190)">
      <text font-family="Verdana, Geneva, sans-serif" font-size="140" font-weight="bold" fill="#000000" opacity="0.3" text-anchor="middle" letter-spacing="2" x="5" y="5">PBS</text>
      <text font-family="Verdana, Geneva, sans-serif" font-size="140" font-weight="bold" fill="#000000" stroke="#ffffff" stroke-width="4" text-anchor="middle" letter-spacing="2">PBS</text>
    </g>
    
    <g id="text_DESIGNS_Small" transform="translate(250, 310)">
      <text font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="bold" fill="#ffffff" stroke="#000000" stroke-width="1.5" text-anchor="middle" letter-spacing="8">DESIGNS</text>
    </g>
    
    <circle cx="250" cy="250" r="248" fill="none" stroke="#666666" stroke-width="3"/>
    <circle cx="250" cy="250" r="245" fill="none" stroke="url(#ringGradient)" stroke-width="4"/>
    <circle cx="250" cy="250" r="241" fill="none" stroke="#666666" stroke-width="1.5"/>
  </g>
</svg>
